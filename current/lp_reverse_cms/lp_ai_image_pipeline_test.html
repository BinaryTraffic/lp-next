<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LP AI 画像パイプライン（テスト）</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-4">
  <div class="container" style="max-width:720px">
    <h1 class="h4 mb-3">LP AI 画像パイプライン（テスト）</h1>
    <p class="small text-muted mb-3">
      セッションのワークスペース内画像に対して <code>store/lp_ai_image_pipeline.php</code> を叩きます。
      同じオリジンで CMS を開いている必要があります（Cookie セッションで <code>ws_*</code> が一致）。
    </p>
    <div class="mb-3">
      <label class="form-label" for="rel">image_local_rel（例: output/ws_…/assets/hero.jpg）</label>
      <input type="text" id="rel" class="form-control" placeholder="output/ws_xxxxxxxx/assets/foo.jpg">
    </div>
    <div class="mb-3">
      <label class="form-label" for="industry">industry（任意）</label>
      <input type="text" id="industry" class="form-control" placeholder="歯科クリニック">
    </div>
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="forcePh">
      <label class="form-check-label" for="forcePh">force_placeholder（常にサイズ付き PNG）</label>
    </div>
    <button type="button" id="run" class="btn btn-primary">実行</button>
    <hr>
    <pre id="out" class="small bg-dark text-light p-3 rounded" style="min-height:120px;white-space:pre-wrap"></pre>
    <div id="thumb" class="mt-3"></div>
  </div>
  <script>
(function () {
  var run = document.getElementById('run');
  var out = document.getElementById('out');
  var thumb = document.getElementById('thumb');
  run.addEventListener('click', function () {
    out.textContent = '…';
    thumb.innerHTML = '';
    var rel = document.getElementById('rel').value.trim().replace(/^\/+/, '');
    var body = {
      image_local_rel: rel,
      industry: document.getElementById('industry').value.trim(),
      force_placeholder: document.getElementById('forcePh').checked
    };
    fetch('store/lp_ai_image_pipeline.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }).then(function (r) {
      return r.text().then(function (t) {
        try {
          var j = JSON.parse(t);
          out.textContent = JSON.stringify(j, null, 2);
          if (j.url) {
            var src = new URL(j.url, window.location.origin).href;
            thumb.innerHTML = '<p class="small mb-1">結果画像</p><img src="' + src + '" class="img-fluid border rounded" alt="">';
          }
        } catch (e) {
          out.textContent = t || r.statusText;
        }
        if (!r.ok) return;
      });
    }).catch(function (e) {
      out.textContent = String(e);
    });
  });
})();
  </script>
</body>
</html>
