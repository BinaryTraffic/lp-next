<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LP-NEXT 開発状況</title>
  <style>
    :root {
      --text: #1a1a1a;
      --muted: #555;
      --link: #0b57d0;
      --border: #d0d7de;
      --thead: #f0f3f6;
    }
    * { box-sizing: border-box; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      line-height: 1.65;
      color: var(--text);
      margin: 0;
      padding: 0 1rem 2.5rem;
      padding-left: max(1rem, env(safe-area-inset-left));
      padding-right: max(1rem, env(safe-area-inset-right));
      padding-bottom: max(2.5rem, env(safe-area-inset-bottom));
      max-width: 46rem;
      margin-left: auto;
      margin-right: auto;
    }
    @media (min-width: 600px) {
      body { padding-left: 1.25rem; padding-right: 1.25rem; }
    }
    header {
      padding: 1.25rem 0 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    header h1 { font-size: clamp(1.2rem, 4.2vw, 1.45rem); margin: 0 0 0.4rem; font-weight: 600; line-height: 1.25; }
    .meta { font-size: 0.9rem; color: var(--muted); margin: 0; line-height: 1.5; }
    .nav { margin-top: 0.85rem; font-size: 0.9rem; line-height: 1.6; }
    .nav a {
      color: var(--link);
      text-decoration: none;
      display: inline-block;
      padding: 0.35rem 0.15rem;
      margin-right: 0.75rem;
      min-height: 44px;
      line-height: 1.3;
    }
    @media (min-width: 600px) {
      .nav a { min-height: unset; display: inline; padding: 0; }
    }
    .nav a:hover { text-decoration: underline; }

    .phase-hero {
      background: #f4f6f8;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem 1rem;
      margin: 0 0 1.1rem;
    }
    .phase-hero h2 {
      font-size: 1.05rem;
      margin: 0 0 0.5rem;
      font-weight: 600;
      border: 0;
      padding: 0;
    }
    .phase-hero .table-wrap { margin: 0.5rem 0 0.35rem; }

    .s1-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem 1rem;
      margin: 0 0 1.1rem;
    }
    .s1-card h2 { font-size: 1.02rem; margin: 0 0 0.5rem; font-weight: 600; }
    .s1-list { list-style: none; padding: 0; margin: 0; }
    .s1-list li { padding: 0.35rem 0; border-bottom: 1px solid #eee; font-size: 0.92rem; }
    .s1-list li:last-child { border-bottom: none; }
    .s1-list li.done { color: #0d3d1f; }
    .s1-list li.todo { color: #555; }

    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0.6rem 0 1.1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
    }
    .phase-hero .table-wrap table {
      width: 100%;
      min-width: 18rem;
      border-collapse: collapse;
      font-size: 0.86rem;
      margin: 0;
    }
    @media (min-width: 480px) { .phase-hero .table-wrap table { font-size: 0.88rem; } }
    .phase-hero th, .phase-hero td {
      border: 1px solid var(--border);
      padding: 0.45rem 0.55rem;
      text-align: left;
      vertical-align: top;
    }
    @media (min-width: 600px) { .phase-hero th, .phase-hero td { padding: 0.5rem 0.65rem; } }
    .phase-hero thead th { background: var(--thead); font-weight: 600; }
    .phase-hero tbody tr:nth-child(even) td { background: #fafbfc; }
    .phase-hero tr.st-done td {
      background: #e6f4ea !important;
      color: #0d3d1f;
    }
    .phase-hero tr.st-active td {
      background: #fff8e5 !important;
      color: #5a4500;
    }
  </style>
</head>
<body>
  <header>
    <h1>LP-NEXT 開発状況</h1>
    <p class="meta">CMS <strong>v1.3.0</strong>（<code>APP_VERSION</code>）· 要件対応表は <a href="JOURNAL.md#v130-要件と実装状況レポート">JOURNAL.md</a> · 最終更新：2026-04-26</p>
    <nav class="nav">
      <a href="index.html">LP-NEXT 入口</a>
      <a href="lp_reverse_cms/">管理画面</a>
    </nav>
  </header>
  <div id="phase-hero" class="phase-hero"></div>
  <div id="s1-card" class="s1-card"></div>
  <noscript>
    <p>JavaScript を有効にしてください。</p>
  </noscript>
  <script>
    const PHASES = [
      {
        label: 'Ph.0',
        name: 'LP複製エンジン',
        desc: 'URL入力 → HTML取得・アセット保存・手動編集・スタンドアロン出力',
        status: 'done',
      },
      {
        label: 'S1',
        name: 'AI画像分析・自動置換エンジン',
        desc: 'Claude Vision で画像タイプ判定 → HF FLUX で代替画像生成 → GD でテキスト合成',
        status: 'active',
      },
      {
        label: 'S2',
        name: 'AI画像提案エンジン',
        desc: '業種文脈に合う代替候補をAIが提示',
        status: 'pending',
      },
      {
        label: 'S3',
        name: 'テキスト自動生成',
        desc: '業種・トーンを指定してキャッチコピー・本文を生成',
        status: 'pending',
      },
      {
        label: 'S4',
        name: '承認ログと学習ループ',
        desc: '人間の選択をAIに蓄積し次回提案精度を向上',
        status: 'pending',
      },
      {
        label: 'S5',
        name: '精度向上・業種テンプレート化',
        desc: '自動生成精度の向上と業種別テンプレート整備',
        status: 'pending',
      },
    ];

    const S1_ITEMS = [
      { text: 'Claude Vision で画像タイプ自動判定', done: true },
      { text: 'HF FLUX による任意サイズ画像生成', done: true },
      { text: 'ボタン・UI画像のテキスト合成（余白保持）', done: true },
      { text: 'グラデーション・バッジ・フレーム付き画像対応', done: true },
      { text: '写真・イラスト系画像の自動生成', done: false },
      { text: 'composite（背景＋テキスト混在）画像の再合成', done: false },
    ];

    function renderPhases() {
      const rows = PHASES.map(function (p) {
        const badge = p.status === 'done' ? '✅ 完了'
          : p.status === 'active' ? '🔄 開発中'
            : '🔲 予定';
        const cls = p.status === 'done' ? 'st-done'
          : p.status === 'active' ? 'st-active'
            : '';
        return '<tr class="' + cls + '">' +
          '<td><strong>' + escapeHtml(p.label) + '</strong></td>' +
          '<td>' + escapeHtml(p.name) + '</td>' +
          '<td>' + escapeHtml(p.desc) + '</td>' +
          '<td>' + badge + '</td>' +
          '</tr>';
      }).join('');

      document.getElementById('phase-hero').innerHTML =
        '<h2>フェーズ概要</h2>' +
        '<div class="table-wrap">' +
        '<table>' +
        '<thead><tr><th>フェーズ</th><th>内容</th><th>概要</th><th>状態</th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
        '</table>' +
        '</div>';
    }

    function renderS1() {
      const items = S1_ITEMS.map(function (i) {
        return '<li class="' + (i.done ? 'done' : 'todo') + '">' +
          (i.done ? '✅' : '🔲') + ' ' + escapeHtml(i.text) +
          '</li>';
      }).join('');

      document.getElementById('s1-card').innerHTML =
        '<h2>S1 直近進捗</h2>' +
        '<ul class="s1-list">' + items + '</ul>';
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    document.addEventListener('DOMContentLoaded', function () {
      renderPhases();
      renderS1();
    });
  </script>
</body>
</html>
